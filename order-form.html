<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>卡哩共好｜訂餐</title>

<meta name="description" content="卡哩共好訂餐入口，選擇個人訂餐或團購訂餐。">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC",sans-serif;
    background:#FAF8F3;
    color:#333;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:24px;
}

.container{
    width:100%;
    max-width:480px;
    text-align:center;
}

.logo{
    font-size:14px;
    letter-spacing:2px;
    color:#888;
    margin-bottom:12px;
}

h1{
    font-size:32px;
    color:#3E2F24;
    margin-bottom:16px;
}

.subtitle{
    color:#666;
    line-height:1.8;
    margin-bottom:50px;
}

.order-link{
    display:block;

    width:100%;

    padding:22px;

    margin-bottom:20px;

    background:#C89B3C;

    color:#FFF;

    text-decoration:none;

    font-size:20px;
    font-weight:600;

    border-radius:14px;

    transition:0.3s;
}

.order-link:hover{
    opacity:0.9;
}

.order-link.secondary{
    background:#3E2F24;
}

.footer-note{
    margin-top:30px;
    font-size:14px;
    color:#888;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        KARE NODE SYSTEM
    </div>

    <h1>
        卡哩共好訂餐
    </h1>

    <p class="subtitle">
        請選擇訂餐方式
    </p>

    <a
        href="personal-order.html"
        class="order-link"
        aria-label="個人訂餐"
    >
        個人訂餐
    </a>

    <a
        href="group-order.html"
        class="order-link secondary"
        aria-label="團購訂餐"
    >
        團購訂餐
    </a>

    <div class="footer-note">
        每一份餐點，都是支持社區共好的一份力量。
    </div>

</div>

</body>
</html>
